<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>قائمة العقارات</title>
  <style>
    :root{--accent:#2b7a78;--muted:#666}
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;line-height:1.4;margin:0;padding:20px;background:#f6f8f9;color:#111}
    header{display:flex;gap:16px;align-items:center;justify-content:space-between;margin-bottom:18px}
    h1{margin:0;font-size:1.4rem;color:var(--accent)}
    .controls{display:flex;gap:8px;flex-wrap:wrap}
    .controls input,.controls select{padding:8px;border:1px solid #ddd;border-radius:6px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
    .card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;flex-direction:column}
    .card img{width:100%;height:160px;object-fit:cover}
    .card-body{padding:12px;display:flex;flex-direction:column;gap:8px}
    .meta{display:flex;justify-content:space-between;align-items:center}
    .price{color:var(--accent);font-weight:700}
    .tags{font-size:0.85rem;color:var(--muted)}
    .btn{background:var(--accent);color:#fff;padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
    .btn.secondary{background:#e9f0ef;color:var(--accent)}
    /* modal */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:10px;max-width:800px;width:100%;overflow:auto;max-height:90vh}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid #eee}
    .modal-body{padding:18px}
    @media (max-width:520px){.card img{height:140px}}
  </style>
</head>
<body>
  <header>
    <h1>عقارات متاحة</h1>
    <div class="controls">
      <input id="search" type="search" placeholder="ابحث بالموقع أو الوصف" oninput="applyFilters()">
      <select id="type" onchange="applyFilters()">
        <option value="all">الكل</option>
        <option value="apartment">شقة</option>
        <option value="villa">فيلا</option>
        <option value="studio">استوديو</option>
      </select>
      <input id="minPrice" type="number" placeholder="الحد الأدنى للسعر" oninput="applyFilters()">
      <input id="maxPrice" type="number" placeholder="الحد الأقصى للسعر" oninput="applyFilters()">
      <button class="btn" onclick="resetFilters()">إعادة</button>
    </div>
  </header>

  <main>
    <section id="properties" class="grid" aria-live="polite"></section>
  </main>

  <!-- Modal -->
  <div id="overlay" class="overlay" onclick="closeModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">تفاصيل العقار</h3>
        <button class="btn secondary" onclick="closeModal()">إغلاق</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    // مثال بيانات؛ في التطبيق الحقيقي اجلب من API
    const properties = [
      { id:1,title:'شقة فاخرة في وسط المدينة',type:'apartment',price:120000,location:'الرياض',beds:3,baths:2,area:140,image:'https://via.placeholder.com/800x480?text=Apartment+1',desc:'شقة واسعة ومشرقة، قريبة من المواصلات والأسواق.'},
      { id:2,title:'فيلا مع حديقة كبيرة',type:'villa',price:450000,location:'جدة',beds:5,baths:4,area:420,image:'https://via.placeholder.com/800x480?text=Villa+1',desc:'فيلا فاخرة بموقع متميز وحديقة خاصة ومسبح.'},
      { id:3,title:'استوديو مناسب للمستثمرين',type:'studio',price:60000,location:'الدمام',beds:1,baths:1,area:45,image:'https://via.placeholder.com/800x480?text=Studio+1',desc:'استوديو حديث للإيجار مع تصميم عملي.'},
      { id:4,title:'شقة عائلية قرب المدارس',type:'apartment',price:180000,location:'القصيم',beds:4,baths:3,area:180,image:'https://via.placeholder.com/800x480?text=Apartment+2',desc:'مناسبة للعائلات، مطبخ مجهز ومواقف سيارات.'}
    ];

    const container = document.getElementById('properties');

    function formatCurrency(v){return new Intl.NumberFormat('ar-EG',{style:'currency',currency:'SAR',maximumFractionDigits:0}).format(v)}

    function renderProperties(list){
      container.innerHTML = '';
      if(!list.length){container.innerHTML = '<p>لا توجد عقارات مطابقة للفلتر.</p>';return}
      list.forEach(p=>{
        const card = document.createElement('article');card.className='card';
        card.innerHTML = `
          <img src="${p.image}" alt="${p.title}">
          <div class="card-body">
            <div>
              <strong>${p.title}</strong>
              <div class="tags">${p.location} • ${p.area} م² • ${p.beds} غرف • ${p.baths} حمّام</div>
            </div>
            <div class="meta">
              <div class="price">${formatCurrency(p.price)}</div>
              <div>
                <button class="btn secondary" onclick="showDetails(${p.id})">عرض</button>
                <button class="btn" onclick="contactAgent(${p.id})">تواصل</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      })
    }

    function applyFilters(){
      const q = document.getElementById('search').value.trim().toLowerCase();
      const type = document.getElementById('type').value;
      const min = Number(document.getElementById('minPrice').value) || 0;
      const max = Number(document.getElementById('maxPrice').value) || Infinity;

      const filtered = properties.filter(p=>{
        if(type!=='all' && p.type!==type) return false;
        if(p.price<min || p.price>max) return false;
        if(q){
          const hay = (p.title+' '+p.location+' '+p.desc).toLowerCase();
          return hay.includes(q);
        }
        return true;
      });
      renderProperties(filtered);
    }

    function resetFilters(){
      document.getElementById('search').value='';
      document.getElementById('type').value='all';
      document.getElementById('minPrice').value='';
      document.getElementById('maxPrice').value='';
      renderProperties(properties);
    }

    function showDetails(id){
      const p = properties.find(x=>x.id===id);
      if(!p) return;
      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <img src="${p.image}" alt="${p.title}" style="width:100%;height:260px;object-fit:cover;border-radius:6px;margin-bottom:12px">
        <h4>${p.title}</h4>
        <p class="tags">${p.location} • ${p.area} م² • ${p.beds} غرف • ${p.baths} حمّام</p>
        <p style="font-weight:700;color:var(--accent);">${formatCurrency(p.price)}</p>
        <p>${p.desc}</p>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn" onclick="contactAgent(${p.id})">طلب معلومات</button>
          <button class="btn secondary" onclick="closeModal()">إغلاق</button>
        </div>
      `;
      document.getElementById('overlay').style.display='flex';
    }

    function closeModal(e){
      if(e && e.type==='click' && e.target.id!=='overlay') return; // guard
      document.getElementById('overlay').style.display='none';
    }

    function contactAgent(id){
      const p = properties.find(x=>x.id===id);
      alert('تم إرسال طلب للتواصل بخصوص: '+p.title);
    }

    // initial render
    renderProperties(properties);
  </script>
</body>
</html>
