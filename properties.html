<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>قائمة العقارات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root{
      --accent:#2b7a78;
      --accent-light:#4a9996;
      --muted:#666;
      --light-bg:#f6f8f9;
      --card-shadow:0 4px 12px rgba(0,0,0,0.1);
      --hover-shadow:0 8px 24px rgba(0,0,0,0.15);
    }
    
    * { box-sizing: border-box; }
    
    body{
      font-family:'Segoe UI','Roboto','Helvetica Neue',Arial,sans-serif;
      line-height:1.6;
      margin:0;
      padding:0;
      background:linear-gradient(135deg, #f6f8f9 0%, #e9f0ef 100%);
      color:#111;
      min-height:100vh;
    }
    
    header{
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      padding:28px 20px;
      margin-bottom:32px;
      box-shadow:var(--card-shadow);
      position:sticky;
      top:0;
      z-index:100;
    }
    
    .header-content{
      max-width:1400px;
      margin:0 auto;
    }
    
    h1{
      margin:0 0 20px 0;
      font-size:2rem;
      color:#fff;
      display:flex;
      align-items:center;
      gap:12px;
    }
    
    h1 i { font-size:2.2rem; }
    
    .controls{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }
    
    .controls input,
    .controls select{
      padding:10px 14px;
      border:2px solid rgba(255,255,255,0.3);
      border-radius:8px;
      background:rgba(255,255,255,0.95);
      color:#111;
      font-size:0.95rem;
      transition:all 0.3s ease;
    }
    
    .controls input:focus,
    .controls select:focus{
      outline:none;
      border-color:#fff;
      background:#fff;
      box-shadow:0 0 0 3px rgba(255,255,255,0.2);
    }
    
    .controls input::placeholder{
      color:#999;
    }
    
    main{
      max-width:1400px;
      margin:0 auto;
      padding:0 20px 40px;
    }
    
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:24px;
      animation:fadeIn 0.5s ease;
    }
    
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    
    .card{
      background:#fff;
      border-radius:12px;
      overflow:hidden;
      box-shadow:var(--card-shadow);
      display:flex;
      flex-direction:column;
      transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor:pointer;
      position:relative;
    }
    
    .card:hover{
      transform:translateY(-8px);
      box-shadow:var(--hover-shadow);
    }
    
    .card-image{
      position:relative;
      overflow:hidden;
      height:200px;
    }
    
    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
      transition:transform 0.4s ease;
    }
    
    .card:hover img{
      transform:scale(1.08);
    }
    
    .badge{
      position:absolute;
      top:12px;
      right:12px;
      background:var(--accent);
      color:#fff;
      padding:6px 12px;
      border-radius:20px;
      font-size:0.8rem;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:4px;
      z-index:10;
    }
    
    .featured-badge{
      background:#ff6b6b;
    }
    
    .card-body{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex-grow:1;
    }
    
    .card-title{
      font-size:1.1rem;
      font-weight:700;
      color:#111;
      line-height:1.3;
      margin:0;
    }
    
    .card-tags{
      font-size:0.85rem;
      color:var(--muted);
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    
    .tag-item{
      display:flex;
      align-items:center;
      gap:6px;
    }
    
    .tag-item i{
      color:var(--accent);
      width:16px;
      text-align:center;
    }
    
    .card-meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:12px;
      border-top:1px solid #eee;
      margin-top:auto;
    }
    
    .price{
      color:var(--accent);
      font-weight:700;
      font-size:1.2rem;
    }
    
    .btn{
      background:var(--accent);
      color:#fff;
      padding:10px 14px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:600;
      font-size:0.9rem;
      transition:all 0.3s ease;
      display:inline-flex;
      align-items:center;
      gap:6px;
      justify-content:center;
    }
    
    .btn:hover{
      background:var(--accent-light);
      transform:scale(1.05);
    }
    
    .btn:active{
      transform:scale(0.98);
    }
    
    .btn.secondary{
      background:#e9f0ef;
      color:var(--accent);
    }
    
    .btn.secondary:hover{
      background:#d4e8e5;
    }
    
    .btn-group{
      display:flex;
      gap:8px;
      margin-top:8px;
    }
    
    /* modal */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:1000;
      animation:fadeInOverlay 0.3s ease;
    }
    
    @keyframes fadeInOverlay { from{opacity:0;} to{opacity:1;} }
    
    .modal{
      background:#fff;
      border-radius:12px;
      max-width:700px;
      width:100%;
      overflow:auto;
      max-height:90vh;
      animation:slideUp 0.3s ease;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }
    
    @keyframes slideUp { from{transform:translateY(30px);opacity:0;} to{transform:translateY(0);opacity:1;} }
    
    .modal-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px;
      border-bottom:1px solid #eee;
      background:linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color:#fff;
    }
    
    .modal-header h3{
      margin:0;
      font-size:1.4rem;
    }
    
    .modal-body{
      padding:24px;
    }
    
    .modal-image{
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:8px;
      margin-bottom:16px;
    }
    
    .modal-title{
      font-size:1.6rem;
      font-weight:700;
      color:#111;
      margin:0 0 12px 0;
    }
    
    .modal-tags{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
      gap:12px;
      margin:16px 0;
    }
    
    .modal-tag{
      background:#f0f6f5;
      padding:12px;
      border-radius:8px;
      text-align:center;
      border-right:3px solid var(--accent);
    }
    
    .modal-tag-label{
      font-size:0.8rem;
      color:var(--muted);
      display:block;
      margin-bottom:4px;
    }
    
    .modal-tag-value{
      font-weight:700;
      color:var(--accent);
      font-size:1.1rem;
    }
    
    .modal-price{
      font-weight:700;
      color:var(--accent);
      font-size:1.8rem;
      margin:16px 0;
    }
    
    .modal-desc{
      color:#555;
      line-height:1.8;
      margin:16px 0;
    }
    
    .empty-state{
      text-align:center;
      padding:60px 20px;
      color:var(--muted);
    }
    
    .empty-state i{
      font-size:3rem;
      margin-bottom:16px;
      opacity:0.5;
    }
    
    .empty-state p{
      font-size:1.1rem;
    }
    
    @media (max-width:768px){
      h1{
        font-size:1.6rem;
      }
      
      .controls{
        gap:8px;
      }
      
      .controls input,
      .controls select{
        padding:8px 12px;
        font-size:0.85rem;
        min-width:100px;
      }
      
      .grid{
        grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
        gap:16px;
      }
      
      .card-image{
        height:160px;
      }
      
      .modal{
        max-height:95vh;
      }
    }
    
    @media (max-width:480px){
      header{
        padding:16px 12px;
        margin-bottom:16px;
      }
      
      h1{
        font-size:1.3rem;
        margin-bottom:12px;
      }
      
      main{
        padding:0 12px 20px;
      }
      
      .controls{
        flex-direction:column;
      }
      
      .controls input,
      .controls select,
      .btn{
        width:100%;
      }
      
      .grid{
        grid-template-columns:1fr;
      }
      
      .card-image{
        height:180px;
      }
      
      .modal-body{
        padding:16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <h1><i class="fas fa-building"></i>عقارات متاحة</h1>
      <div class="controls">
        <input id="search" type="search" placeholder="ابحث بالموقع أو الوصف" oninput="applyFilters()">
        <select id="type" onchange="applyFilters()">
          <option value="all">الكل</option>
          <option value="apartment">شقة</option>
          <option value="villa">فيلا</option>
          <option value="studio">استوديو</option>
        </select>
        <input id="minPrice" type="number" placeholder="الحد الأدنى للسعر" oninput="applyFilters()">
        <input id="maxPrice" type="number" placeholder="الحد الأقصى للسعر" oninput="applyFilters()">
        <button class="btn" onclick="resetFilters()"><i class="fas fa-redo"></i>إعادة</button>
      </div>
    </div>
  </header>

  <main>
    <section id="properties" class="grid" aria-live="polite"></section>
  </main>

  <!-- Modal -->
  <div id="overlay" class="overlay" onclick="closeModal(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle"><i class="fas fa-info-circle"></i>تفاصيل العقار</h3>
        <button class="btn secondary" onclick="closeModal()"><i class="fas fa-times"></i>إغلاق</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    // بيانات العقارات مع صور حقيقية من Unsplash
    const properties = [
      {
        id:1,
        title:'شقة فاخرة في وسط المدينة',
        type:'apartment',
        price:120000,
        location:'الرياض',
        beds:3,
        baths:2,
        area:140,
        image:'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800&h=480&fit=crop',
        desc:'شقة حديثة وفاخرة في موقع مميز بقلب المدينة، قريبة من جميع الخدمات والمرافق. تتمتع بإطلالات رائعة وتصميم عصري.',
        featured:true
      },
      {
        id:2,
        title:'فيلا مع حديقة كبيرة',
        type:'villa',
        price:450000,
        location:'جدة',
        beds:5,
        baths:4,
        area:420,
        image:'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800&h=480&fit=crop',
        desc:'فيلا فخمة مع حديقة واسعة وميزات حديثة. موقع هادئ وآمن مع إطلالات بحرية جميلة.',
        featured:false
      },
      {
        id:3,
        title:'استوديو مناسب للمستثمرين',
        type:'studio',
        price:60000,
        location:'الدمام',
        beds:1,
        baths:1,
        area:45,
        image:'https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=800&h=480&fit=crop',
        desc:'استوديو صغير وعملي مناسب للاستثمار أو السكن المؤقت. في موقع استراتيجي قريب من السوق والمرافق.',
        featured:false
      },
      {
        id:4,
        title:'شقة عائلية قرب المدارس',
        type:'apartment',
        price:180000,
        location:'القصيم',
        beds:4,
        baths:3,
        area:180,
        image:'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800&h=480&fit=crop',
        desc:'شقة مناسبة للعائلات في حي هادئ بالقرب من المدارس والحدائق العامة. مساحة كبيرة وتهوية ممتازة.',
        featured:false
      },
      {
        id:5,
        title:'فيلا عصرية مع مسبح',
        type:'villa',
        price:520000,
        location:'الرياض',
        beds:6,
        baths:5,
        area:500,
        image:'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?w=800&h=480&fit=crop',
        desc:'فيلا عصرية فخمة مع حمام سباحة خاص ومرافق متكاملة. موقع راقي في أفضل أحياء الرياض.',
        featured:true
      },
      {
        id:6,
        title:'شقة مع شرفة واسعة',
        type:'apartment',
        price:95000,
        location:'جدة',
        beds:2,
        baths:1,
        area:95,
        image:'https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800&h=480&fit=crop',
        desc:'شقة مريحة مع شرفة واسعة تطل على المدينة. قريبة من الشاطئ والمطاعم والمقاهي الشهيرة.',
        featured:false
      }
    ];

    const container = document.getElementById('properties');

    function formatCurrency(v){
      return new Intl.NumberFormat('ar-EG',{
        style:'currency',
        currency:'SAR',
        maximumFractionDigits:0
      }).format(v);
    }

    function getTypeIcon(type){
      const icons = {
        'apartment':'fas fa-home',
        'villa':'fas fa-house-user',
        'studio':'fas fa-door-open'
      };
      return icons[type] || 'fas fa-home';
    }

    function getTypeLabel(type){
      const labels = {
        'apartment':'شقة',
        'villa':'فيلا',
        'studio':'استوديو'
      };
      return labels[type] || type;
    }

    function renderProperties(list){
      container.innerHTML = '';
      if(!list.length){
        container.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="fas fa-search"></i>
            <p>لا توجد عقارات مطابقة للفلتر المحدد</p>
          </div>
        `;
        return;
      }

      list.forEach(p=>{
        const card = document.createElement('article');
        card.className='card';
        const badge = p.featured ? '<div class="badge featured-badge"><i class="fas fa-star"></i>مميز</div>' : `<div class="badge"><i class="fas fa-${p.type==='villa'?'house':'door'}"></i>${getTypeLabel(p.type)}</div>`;

        card.innerHTML = `
          <div class="card-image">
            <img src="${p.image}" alt="${p.title}" loading="lazy">
            ${badge}
          </div>
          <div class="card-body">
            <h3 class="card-title">${p.title}</h3>
            <div class="card-tags">
              <div class="tag-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>${p.location}</span>
              </div>
              <div class="tag-item">
                <i class="fas fa-ruler-combined"></i>
                <span>${p.area} م²</span>
              </div>
              <div class="tag-item">
                <i class="fas fa-door-open"></i>
                <span>${p.beds} غرف • ${p.baths} حمّام</span>
              </div>
            </div>
            <div class="card-meta">
              <div class="price">${formatCurrency(p.price)}</div>
              <div class="btn-group">
                <button class="btn secondary" onclick="showDetails(${p.id})"><i class="fas fa-eye"></i>عرض</button>
                <button class="btn" onclick="contactAgent(${p.id})"><i class="fas fa-phone"></i>تواصل</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function applyFilters(){
      const q = document.getElementById('search').value.trim().toLowerCase();
      const type = document.getElementById('type').value;
      const min = Number(document.getElementById('minPrice').value) || 0;
      const max = Number(document.getElementById('maxPrice').value) || Infinity;

      const filtered = properties.filter(p=>{
        if(type!=='all' && p.type!==type) return false;
        if(p.price<min || p.price>max) return false;
        if(q){
          const hay = (p.title+' '+p.location+' '+p.desc).toLowerCase();
          return hay.includes(q);
        }
        return true;
      });
      renderProperties(filtered);
    }

    function resetFilters(){
      document.getElementById('search').value='';
      document.getElementById('type').value='all';
      document.getElementById('minPrice').value='';
      document.getElementById('maxPrice').value='';
      renderProperties(properties);
    }

    function showDetails(id){
      const p = properties.find(x=>x.id===id);
      if(!p) return;

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <img src="${p.image}" alt="${p.title}" class="modal-image">
        <h4 class="modal-title">${p.title}</h4>
        
        <div class="modal-tags">
          <div class="modal-tag">
            <span class="modal-tag-label"><i class="fas fa-map-marker-alt"></i>الموقع</span>
            <span class="modal-tag-value">${p.location}</span>
          </div>
          <div class="modal-tag">
            <span class="modal-tag-label"><i class="fas fa-ruler-combined"></i>المساحة</span>
            <span class="modal-tag-value">${p.area} م²</span>
          </div>
          <div class="modal-tag">
            <span class="modal-tag-label"><i class="fas fa-door-open"></i>الغرف</span>
            <span class="modal-tag-value">${p.beds}</span>
          </div>
          <div class="modal-tag">
            <span class="modal-tag-label"><i class="fas fa-sink"></i>الحمّامات</span>
            <span class="modal-tag-value">${p.baths}</span>
          </div>
        </div>
        
        <div class="modal-price"><i class="fas fa-money-bill-wave"></i>${formatCurrency(p.price)}</div>
        
        <div class="modal-desc">
          <p><strong>الوصف:</strong><br>${p.desc}</p>
        </div>
        
        <div class="btn-group" style="margin-top:20px;">
          <button class="btn" onclick="contactAgent(${p.id})"><i class="fas fa-phone"></i>طلب معلومات</button>
          <button class="btn secondary" onclick="closeModal()"><i class="fas fa-times"></i>إغلاق</button>
        </div>
      `;
      document.getElementById('overlay').style.display='flex';
    }

    function closeModal(e){
      if(e && e.type==='click' && e.target.id!=='overlay') return;
      document.getElementById('overlay').style.display='none';
    }

    function contactAgent(id){
      const p = properties.find(x=>x.id===id);
      alert('تم إرسال طلب للتواصل بخصوص: '+p.title+'\n\nسيتم التواصل معك قريباً من قبل فريق المبيعات');
    }

    // initial render
    renderProperties(properties);
  </script>
</body>
</html>
