<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>منصة إدارة العقارات</title>
  <meta name="description" content="منصة إدارة العقارات - أسهل طريقة لإدارة وعرض ومتابعة العقارات">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');

    :root {
      --primary: #0d6efd;
      --secondary: #6f42c1;
      --success: #198754;
      --danger: #dc3545;
      --muted: #6c757d;
      --bg: #f8f9fa;
      --card: #ffffff;
      --border: #e6e9ee;
      font-family: "Cairo", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #222;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #063970 0%, #0d6efd 50%, #6f42c1 100%);
      color: #fff;
      padding: 24px 16px;
      box-shadow: 0 10px 30px rgba(12, 35, 60, 0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
      animation: slideInDown 0.6s ease;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand svg {
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.2));
      transition: transform 0.3s ease;
    }

    .brand:hover svg {
      transform: scale(1.1) rotate(5deg);
    }

    .brand h1 {
      font-size: 24px;
      margin: 0;
      font-weight: 900;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .brand-subtitle {
      color: rgba(255, 255, 255, 0.85);
      font-size: 13px;
      font-weight: 500;
    }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 16px;
      animation: fadeIn 0.8s ease;
    }

    .hero-section {
      text-align: center;
      max-width: 800px;
    }

    .hero-section h2 {
      font-size: 48px;
      color: #063970;
      font-weight: 900;
      margin-bottom: 16px;
      line-height: 1.2;
      animation: slideInUp 0.8s ease;
    }

    .hero-section p {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 40px;
      animation: slideInUp 0.8s ease 0.1s both;
    }

    .nav-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .nav-btn {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 24px;
      background: var(--card);
      border: 2px solid transparent;
      border-radius: 12px;
      text-decoration: none;
      color: #063970;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(12, 35, 60, 0.1);
      font-weight: 600;
      font-size: 16px;
      animation: fadeInUp 0.6s ease;
    }

    .nav-btn:nth-child(1) {
      animation-delay: 0.2s;
    }

    .nav-btn:nth-child(2) {
      animation-delay: 0.3s;
    }

    .nav-btn:nth-child(3) {
      animation-delay: 0.4s;
    }

    .nav-btn:nth-child(4) {
      animation-delay: 0.5s;
    }

    .nav-btn:hover {
      transform: translateY(-8px);
      border-color: var(--primary);
      box-shadow: 0 15px 40px rgba(13, 110, 253, 0.2);
      color: var(--primary);
    }

    .nav-btn span {
      font-size: 32px;
    }

    .nav-btn-label {
      font-size: 14px;
      color: var(--muted);
      transition: color 0.3s ease;
    }

    .nav-btn:hover .nav-btn-label {
      color: var(--primary);
    }

    /* Footer */
    footer {
      padding: 30px 16px;
      color: var(--muted);
      font-size: 14px;
      background: rgba(255, 255, 255, 0.8);
      border-top: 1px solid #e6e9ee;
      text-align: center;
      animation: slideInUp 0.6s ease 0.6s both;
    }

    /* Animations */
    @keyframes slideInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        padding: 16px 12px;
      }

      .brand h1 {
        font-size: 18px;
      }

      main {
        padding: 40px 16px;
      }

      .hero-section h2 {
        font-size: 32px;
      }

      .hero-section p {
        font-size: 16px;
      }

      .nav-buttons {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .nav-btn {
        padding: 24px 20px;
      }
    }

    @media (max-width: 480px) {
      .hero-section h2 {
        font-size: 24px;
      }

      .hero-section p {
        font-size: 14px;
      }

      .nav-btn {
        padding: 20px 16px;
        font-size: 14px;
      }

      .nav-btn span {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="brand">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="24" height="24" rx="6" fill="white" opacity="0.12" />
          <path d="M4 13.5L12 6l8 7.5V20a1 1 0 0 1-1 1h-4v-6H9v6H5a1 1 0 0 1-1-1v-6.5z" fill="white" />
        </svg>
        <div>
          <h1>منصة إدارة العقارات</h1>
          <div class="brand-subtitle">إدارة، عرض، ومتابعة العقارات بسهولة</div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero-section">
      <h2>مرحباً بك في منصة إدارة العقارات</h2>
      <p>اختر أحد الخيارات أدناه للبدء</p>

      <div class="nav-buttons">
        <a href="properties.html" class="nav-btn">
          <span>🏢</span>
          العقارات
          <span class="nav-btn-label">عرض جميع العقارات</span>
        </a>
        <a href="about.html" class="nav-btn">
          <span>ℹ️</span>
          من نحن
          <span class="nav-btn-label">اعرف أكثر عننا</span>
        </a>
        <a href="Contact.html" class="nav-btn">
          <span>📞</span>
          اتصل بنا
          <span class="nav-btn-label">تواصل معنا الآن</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div>© 2026 منصة إدارة العقارات — جميع الحقوق محفوظة</div>
    </div>
  </footer>

</body>
</html>
